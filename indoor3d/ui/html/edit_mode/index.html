<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="eyebrow">IndoorGML</div>
    <h1 id="modeTitle">нҺём§‘ лӘЁл“ң</h1>
  </header>

  <main>
    <section id="emptyPanel" class="mode-panel">
      <div id="modelSummary" class="model-summary">
        <div class="summary-title">нҳ„мһ¬ IndoorGML мҡ”мҶҢ</div>
        <div id="cellTypeCounts" class="type-counts"></div>
        <div class="summary-metrics">
          <span>State <strong id="stateCount">0</strong></span>
          <span>Transition <strong id="totalTransitionCount">0</strong></span>
        </div>
      </div>
      <p class="description">CellSpaceлҘј м„ нғқн•ҳл©ҙ нғҖмһ…мқ„ ліҖкІҪн•  мҲҳ мһҲмҠөлӢҲлӢӨ.<br>Solid Groupл§Ң м„ нғқн•ҳл©ҙ CellSpaceлЎң ліҖнҷҳн•  мҲҳ мһҲмҠөлӢҲлӢӨ.</p>
    </section>

    <section id="solidPanel" class="mode-panel hidden">
      <div class="summary-line">Solid Group <span id="solidCount">0</span>к°ң м„ нғқлҗЁ</div>
      <label class="field-label" for="solidClassification">CellSpace нғҖмһ…</label>
      <select id="solidClassification"></select>
      <button id="convertSelected" class="command" type="button">
        <img id="convertIcon" alt="">
        <span>м„ нғқн•ң Solid Groupмқ„ CellSpaceлЎң ліҖнҷҳ</span>
      </button>
    </section>

    <section id="cellPanel" class="mode-panel hidden">
      <div id="singleCellInfo" class="info-grid">
        <span>ID</span><strong id="selectedId">-</strong>
        <span>мқҙлҰ„</span><strong id="selectedName">-</strong>
        <span>м—°кІ° Transition</span><strong id="transitionCount">0</strong>
      </div>
      <div id="multiCellInfo" class="summary-line hidden">
        CellSpace <span id="cellSpaceCount">0</span>к°ң м„ нғқлҗЁ
      </div>
      <label class="field-label" for="selectedClassification">CellSpace нғҖмһ…</label>
      <select id="selectedClassification"></select>
      <button id="changeType" class="command" type="button">
        <img id="changeTypeIcon" alt="">
        <span>м„ нғқн•ң CellSpace нғҖмһ… ліҖкІҪ</span>
      </button>
    </section>

    <section class="mode-panel">
      <div class="range-header">
        <label class="field-label" for="overlayMinRadius">Overlay л°ҳм§ҖлҰ„ лІ”мң„</label>
        <output id="overlayRadiusValue"></output>
      </div>
      <div class="radius-preview" aria-hidden="true">
        <span id="maxRadiusPreview" class="radius-circle max"></span>
        <span id="minRadiusPreview" class="radius-circle min"></span>
      </div>
      <div class="range-row">
        <input id="overlayMinRadius" type="range" min="1" max="15" step="1">
        <input id="overlayMaxRadius" type="range" min="7" max="25" step="1">
      </div>
    </section>

    <button id="finish" class="primary" type="button">нҺём§‘ мҷ„лЈҢ</button>
    <button id="recheckErrors" class="command no-icon hidden" type="button">
      <span>мҳӨлҘҳ мҡ”мҶҢ мһ¬кІҖмӮ¬</span>
    </button>
    <button id="clearAll" class="danger" type="button">лӘЁл“  IndoorGML мҡ”мҶҢ мӮӯм ң</button>
  </main>

  <script src="app.js"></script>
</body>
</html>
