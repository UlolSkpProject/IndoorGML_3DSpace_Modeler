name: Finalize minimal-failure baseline

on:
  push:
    branches:
      - feature/local-normalizer-minimal-failure
    paths:
      - .github/workflows/merge-develop-minimal-failure.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore e706e1d normalizer tests and retag
        shell: bash
        run: |
          set -euo pipefail

          TARGET_BRANCH="feature/local-normalizer-minimal-failure"
          BASE_SHA="e706e1d869897eb9f0d3a6575ead4bf75775e01c"
          TAG_NAME="최소실패-지점"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          while IFS= read -r path; do
            [ -n "$path" ] || continue
            case "$path" in
              test/test_gml_exporter_local_vertex_normalization.rb)
                # Export behavior intentionally follows develop.
                git rm -f --ignore-unmatch -- "$path"
                ;;
              *)
                git checkout "$BASE_SHA" -- "$path"
                ;;
            esac
          done < <(
            git ls-tree -r --name-only "$BASE_SHA" |
              grep -E '(local_vertex_normalizer|local_vertex_normalization)' || true
          )

          git rm -f -- .github/workflows/merge-develop-minimal-failure.yml
          git add -A
          git commit -m "e706e1d normalizer 회귀 테스트 복구 및 최소실패 기준 확정"
          FINAL_SHA="$(git rev-parse HEAD)"

          git tag -f -a "$TAG_NAME" -m "최소실패 지점" "$FINAL_SHA"
          git push origin "HEAD:${TARGET_BRANCH}"
          git push origin "refs/tags/${TAG_NAME}" --force

          echo "Final commit: ${FINAL_SHA}"
          echo "Tag: ${TAG_NAME}"
