name: LVN dead code cleanup

on:
  push:
    branches:
      - feature/local-vertices-normalization-v2
    paths:
      - script/lvn_dead_code_audit.rb
      - .github/workflows/lvn-dead-code-audit.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/local-vertices-normalization-v2
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - name: Apply cleanup
        run: ruby script/lvn_dead_code_audit.rb
      - name: Check Ruby syntax
        run: |
          find indoor3d/application/local_vertex_normalizer -name '*.rb' -print0 | xargs -0 -n1 ruby -c
          ruby -c indoor3d/application/local_vertex_normalizer.rb
      - name: Run LVN smoke tests
        run: |
          for test_file in test/local_vertex_normalizer_v2_*smoke.rb; do
            ruby "$test_file"
          done
      - name: Run regression tests
        run: ruby test/run_all.rb
      - name: Commit cleanup directly to branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No cleanup changes to commit'
            exit 0
          fi
          git commit -m 'Remove LocalVertexNormalizer dead code'
          git push origin HEAD:feature/local-vertices-normalization-v2

# Direct ref trigger; no pull request is used.
